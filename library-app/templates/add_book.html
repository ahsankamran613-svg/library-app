{% extends "base.html" %}
{% block title %}Add Book — LibraryMS{% endblock %}
{% block content %}
<div style="max-width:520px;">
    <h1>Add New Book</h1>
    <div class="card">
        <form method="POST" action="{{ url_for('add_book') }}" id="add-book-form">
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" class="form-control" placeholder="Book title" required>
            </div>
            <div class="form-group">
                <label for="author">Author *</label>
                <input type="text" id="author" name="author" class="form-control" placeholder="Author name" required>
            </div>
            <div class="form-group">
                <label for="isbn">ISBN (optional)</label>
                <input type="text" id="isbn" name="isbn" class="form-control" placeholder="e.g. 978-3-16-148410-0">
            </div>
            <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
                <button type="submit" class="btn btn-primary" id="submit-add-book">Add Book</button>
                <a href="{{ url_for('books') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
