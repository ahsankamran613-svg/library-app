{% extends "base.html" %}
{% block title %}Register — LibraryMS{% endblock %}
{% block content %}
<div style="max-width:420px;margin:4rem auto;">
    <div class="card">
        <h2 style="text-align:center;margin-bottom:1.5rem;">Create Account</h2>
        <form method="POST" action="{{ url_for('register') }}" id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Choose a password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;" id="register-btn">Register</button>
        </form>
        <p style="text-align:center;margin-top:1.2rem;font-size:0.9rem;color:var(--muted);">
            Have an account? <a href="{{ url_for('login') }}" style="color:var(--accent);">Login</a>
        </p>
    </div>
</div>
{% endblock %}
