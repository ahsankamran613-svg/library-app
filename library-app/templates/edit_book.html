{% extends "base.html" %}
{% block title %}Edit Book — LibraryMS{% endblock %}
{% block content %}
<div style="max-width:520px;">
    <h1>Edit Book</h1>
    <div class="card">
        <form method="POST" action="{{ url_for('edit_book', book_id=book.id) }}" id="edit-book-form">
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" class="form-control" value="{{ book.title }}" required>
            </div>
            <div class="form-group">
                <label for="author">Author *</label>
                <input type="text" id="author" name="author" class="form-control" value="{{ book.author }}" required>
            </div>
            <div class="form-group">
                <label for="isbn">ISBN (optional)</label>
                <input type="text" id="isbn" name="isbn" class="form-control" value="{{ book.isbn or '' }}">
            </div>
            <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
                <button type="submit" class="btn btn-primary" id="submit-edit-book">Save Changes</button>
                <a href="{{ url_for('books') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
